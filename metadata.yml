Slug: antimicrobial-activity-smansoni
Status: In progress
Title: Antimicrobial activity prediction against Schistosoma mansoni from public
  ChEMBL data
Description: Bioactivity prediction of activity against Schistosoma mansoni, 
  trained as binary (active/inactive) classifiers from publicly available data 
  in ChEMBL. Independent models are trained on multiple bioactivity datasets, 
  corresponding to single-point (percent inhibition) assays, among others. A 
  ranking score is provided for each model alongside a combined consensus score.
